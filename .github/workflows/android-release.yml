name: Android Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag for release (example: v1.0.0)"
        required: true
        default: "v1.0.0"

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android components
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Generate release keystore
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          STORE_PASS="${ANDROID_KEYSTORE_PASSWORD:-changeit123}"
          KEY_PASS="${ANDROID_KEY_PASSWORD:-changeit123}"
          keytool -genkeypair -v -storetype PKCS12 \
            -keystore release.keystore \
            -storepass "$STORE_PASS" \
            -alias release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Shiro, OU=AI, O=Shiro, L=Indore, S=MP, C=IN" \
            -keypass "$KEY_PASS"

      - name: Build signed release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: release
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          export KEYSTORE_PASSWORD="${KEYSTORE_PASSWORD:-changeit123}"
          export KEY_PASSWORD="${KEY_PASSWORD:-changeit123}"
          chmod +x ./gradlew
          ./gradlew :android_app:assembleRelease --no-daemon

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: emotion-multimodal-release-apk
          path: android_app/build/outputs/apk/release/*.apk

      - name: Create/Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          name: Emotion Multimodal ${{ github.event.inputs.release_tag || github.ref_name }}
          draft: false
          prerelease: false
          files: |
            android_app/build/outputs/apk/release/*.apk
